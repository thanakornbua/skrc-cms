<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; padding: 0; width: 1280px; height: 854px; overflow: hidden; }
  .tile { width: 1280px; height: 854px; display: flex; }
  .main { flex: 1; height: 854px; background: var(--color-dark); display: flex; align-items: center; justify-content: center; }
  .mark { width: 480px; height: 480px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; }
  .mark img { width: 400px; height: 400px; }
  .strip { width: 140px; height: 854px; display: flex; flex-direction: column; }
  .strip div { flex: 1; }
</style>
</head>
<body>
<div class="tile">
  <div class="main">
    <div class="mark"><img src="uploads/Suankularb_Wittayalai_School_emblem.png" alt=""></div>
  </div>
  <div class="strip">
    <div style="background:#f59e0b"></div>
    <div style="background:#e040fb"></div>
    <div style="background:#3b82f6"></div>
    <div style="background:#7c3aed"></div>
  </div>
</div>
</body>
</html>
