<!-- @dsCard group="Colors" viewport="700x150" name="Primary Gradient" subtitle="135deg magenta → violet → blue — the brand's defining element" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--color-bg); }
  .bar { height: 84px; border-radius: var(--radius-md); background: var(--gradient-brand); box-shadow: var(--shadow-md); }
  .stops { display: flex; gap: 8px; margin-top: 12px; }
  .stop { flex: 1; display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-2); }
  .sw { width: 18px; height: 18px; border-radius: 5px; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="stops">
    <span class="stop"><span class="sw" style="background:#e040fb"></span>#e040fb · 0%</span>
    <span class="stop"><span class="sw" style="background:#7c3aed"></span>#7c3aed · 50%</span>
    <span class="stop"><span class="sw" style="background:#3b82f6"></span>#3b82f6 · 100%</span>
  </div>
</body>
</html>
