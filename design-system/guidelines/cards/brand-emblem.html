<!-- @dsCard group="Brand" viewport="700x320" name="School Emblem" subtitle="Suankularb Wittayalai official emblem — PNG with transparency" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--color-bg); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 8px;
            font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); }
  .on-white { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-md);
              display: flex; align-items: center; justify-content: center; }
  .on-dark  { background: var(--color-dark); border-radius: var(--radius-md);
              display: flex; align-items: center; justify-content: center; }
  .meta { margin-left: auto; }
  .meta h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; color: var(--color-text); }
  .meta p  { font-size: 13px; color: var(--color-muted); margin: 0; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="on-white" style="width:120px;height:120px;">
      <img src="../../uploads/Suankularb_Wittayalai_School_emblem.png" width="96" height="96" alt="SKRC emblem on white">
    </div>
    on white
  </div>
  <div class="swatch">
    <div class="on-dark" style="width:120px;height:120px;">
      <img src="../../uploads/Suankularb_Wittayalai_School_emblem.png" width="96" height="96" alt="SKRC emblem on dark">
    </div>
    on dark
  </div>
  <div class="swatch">
    <div style="width:120px;height:120px;border-radius:var(--radius-md);background:var(--gradient-brand);display:flex;align-items:center;justify-content:center;">
      <img src="../../uploads/Suankularb_Wittayalai_School_emblem.png" width="96" height="96" alt="SKRC emblem on gradient">
    </div>
    on gradient
  </div>
  <div class="meta">
    <h3>โรงเรียนสวนกุหลาบวิทยาลัย</h3>
    <p style="margin-bottom:4px">Suankularb Wittayalai School</p>
    <p>PNG · 1042×1042 · transparent bg</p>
    <p style="margin-top:8px;color:var(--color-text)">Min size 24px · clear space 0.25× diameter</p>
  </div>
</div>
</body>
</html>
