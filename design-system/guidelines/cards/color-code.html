<!-- @dsCard group="Colors" viewport="700x180" name="Code Syntax Palette" subtitle="Highlight scheme on the #1a1a2e code surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--color-bg); }
  pre { margin: 0; background: var(--gradient-brand) top left/100% 4px no-repeat, var(--code-bg);
        border-radius: var(--radius-md); padding: 20px 18px 16px;
        font-family: var(--font-mono); font-size: 13px; line-height: var(--leading-mono);
        color: var(--code-text); box-shadow: var(--shadow-md); }
  .k { color: var(--code-keyword); } .s { color: var(--code-string); } .n { color: var(--code-number); }
  .c { color: var(--code-comment); } .f { color: var(--code-function); } .v { color: var(--code-variable); }
  .o { color: var(--code-operator); }
</style>
</head>
<body>
<pre><span class="c"># ตั้งความเร็วมอเตอร์ — set motor speed</span>
<span class="k">def</span> <span class="f">drive</span>(<span class="v">speed</span>)<span class="o">:</span>
    <span class="v">motor</span><span class="o">.</span><span class="f">run</span>(<span class="v">speed</span> <span class="o">=</span> <span class="n">255</span>)
    <span class="k">return</span> <span class="s">"running"</span></pre>
</body>
</html>
