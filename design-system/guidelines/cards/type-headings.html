<!-- @dsCard group="Type" viewport="700x230" name="Display & Heading Scale" subtitle="text-5xl → text-xl · IBM Plex Sans, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px 20px; background: var(--color-bg); }
  .row { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px solid var(--color-border); padding: 7px 0; }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); width: 88px; flex: none; }
  .spec { font-family: var(--font-sans); font-weight: 700; color: var(--color-text); white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="tag">text-5xl · 48</span><span class="spec" style="font-size:48px">SKRC</span></div>
  <div class="row"><span class="tag">text-4xl · 36</span><span class="spec" style="font-size:36px">Robotics Science</span></div>
  <div class="row"><span class="tag">text-3xl · 30</span><span class="spec" style="font-size:30px">Page heading</span></div>
  <div class="row"><span class="tag">text-2xl · 24</span><span class="spec" style="font-size:24px">Section heading</span></div>
  <div class="row"><span class="tag">text-xl · 20</span><span class="spec" style="font-size:20px">Subheading</span></div>
</body>
</html>
