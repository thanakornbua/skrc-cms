<!-- @dsCard group="Brand" viewport="700x150" name="Radius Scale" subtitle="sm 6 · md 10 · lg 14 · xl 20 · pill ∞" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--color-bg); }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .col { font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); text-align: center; }
  .box { width: 76px; height: 56px; background: var(--color-surface-2); border: 1.5px solid var(--color-border-2); margin-bottom: 6px; }
  .v { color: var(--color-text); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:6px"></div>sm<span class="v"> · 6</span></div>
    <div class="col"><div class="box" style="border-radius:10px"></div>md<span class="v"> · 10</span></div>
    <div class="col"><div class="box" style="border-radius:14px"></div>lg<span class="v"> · 14</span></div>
    <div class="col"><div class="box" style="border-radius:20px"></div>xl<span class="v"> · 20</span></div>
    <div class="col"><div class="box" style="border-radius:9999px"></div>pill<span class="v"> · ∞</span></div>
  </div>
</body>
</html>
