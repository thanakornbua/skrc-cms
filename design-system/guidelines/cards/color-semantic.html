<!-- @dsCard group="Colors" viewport="700x140" name="Semantic Colors" subtitle="Pass / caution / fail / info — used consistently for state" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--color-bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .cell { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-2); }
  .sw { height: 56px; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); margin-bottom: 6px; display:flex; align-items:flex-end; padding:6px; color:#fff; font-weight:600; }
  .name { display:block; color: var(--color-text); }
  .hex { color: var(--color-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:#10b981">passed</div><span class="name">success</span><span class="hex">#10b981</span></div>
    <div class="cell"><div class="sw" style="background:#f59e0b">caution</div><span class="name">warning</span><span class="hex">#f59e0b</span></div>
    <div class="cell"><div class="sw" style="background:#ef4444">failed</div><span class="name">error</span><span class="hex">#ef4444</span></div>
    <div class="cell"><div class="sw" style="background:#3b82f6">info</div><span class="name">info</span><span class="hex">#3b82f6</span></div>
  </div>
</body>
</html>
