<!-- @dsCard group="Slides" viewport="1280x720" name="Scoreboard Slide" subtitle="Big-number rank display — text-5xl gradient mono" -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--color-bg); padding: 64px 96px; box-sizing: border-box; position: relative; }
  .bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--gradient-brand); }
  .eyebrow { font-size: 15px; margin-bottom: 6px; }
  h2 { font-family: var(--font-sans); font-weight: 700; font-size: 40px; margin: 0 0 36px; color: var(--color-text); }
  .row { display: grid; grid-template-columns: 80px 1fr 160px; align-items: center; gap: 24px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 20px 28px; margin-bottom: 14px; }
  .row.top { box-shadow: var(--shadow-md); border-top: 4px solid transparent; border-image: var(--gradient-brand) 1; }
  .rank { font-family: var(--font-mono); font-weight: 700; font-size: 40px; }
  .rank.g { background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent; }
  .team { font-family: var(--font-thai); font-weight: 700; font-size: 26px; color: var(--color-text); }
  .id { font-family: var(--font-mono); font-size: 14px; color: var(--color-muted); }
  .score { font-family: var(--font-mono); font-weight: 600; font-size: 30px; color: var(--color-text); text-align: right; }
</style>
</head>
<body>
  <div class="slide">
    <div class="bar"></div>
    <div class="skrc-eyebrow skrc-gradient-text eyebrow">ROUND 3 · FINAL STANDINGS</div>
    <h2>ผลการแข่งขัน Line-Following</h2>
    <div class="row top">
      <div class="rank g">01</div>
      <div><div class="team">ทีม Voltage</div><div class="id">SKRC-T-014</div></div>
      <div class="score">982 pts</div>
    </div>
    <div class="row">
      <div class="rank" style="color:var(--color-muted)">02</div>
      <div><div class="team">ทีม Circuit Breakers</div><div class="id">SKRC-T-007</div></div>
      <div class="score">940 pts</div>
    </div>
    <div class="row">
      <div class="rank" style="color:var(--color-muted)">03</div>
      <div><div class="team">ทีม Gearbox</div><div class="id">SKRC-T-021</div></div>
      <div class="score">915 pts</div>
    </div>
  </div>
</body>
</html>
