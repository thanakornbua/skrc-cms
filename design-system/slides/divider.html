<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--gradient-brand); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; box-sizing: border-box; }
  .no { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 8px; }
  .th { font-family: var(--font-thai); font-weight: 700; font-size: 56px; color: #fff; }
  .en { font-family: var(--font-mono); font-size: 22px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.92); }
</style>
</head>
<body>
  <div class="slide">
    <div class="no">ส่วนที่ 02 / PART 02</div>
    <div class="th">เซนเซอร์และการรับรู้</div>
    <div class="en">Sensors &amp; Perception</div>
  </div>
</body>
</html>
