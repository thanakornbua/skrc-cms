<!-- @dsCard group="Slides" viewport="1280x720" name="Title Slide" subtitle="Course title — gradient display heading on white-lab surface" -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--color-bg); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 0 96px; box-sizing: border-box; }
  .bar { position: absolute; top: 0; left: 0; right: 0; height: 10px; background: var(--gradient-brand); }
  .eyebrow { font-size: 16px; margin-bottom: 20px; }
  h1 { font-family: var(--font-sans); font-weight: 700; font-size: 72px; line-height: 1.05; letter-spacing: -0.02em; margin: 0; }
  .th { font-family: var(--font-thai); font-weight: 700; font-size: 40px; margin-top: 16px; color: var(--color-text); }
  .meta { position: absolute; bottom: 56px; left: 96px; font-family: var(--font-mono); font-size: 15px; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .badge { position: absolute; bottom: 52px; right: 96px; font-family: var(--font-mono); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; background: var(--gradient-brand); padding: 8px 18px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="slide">
    <div class="bar"></div>
    <div class="skrc-eyebrow skrc-gradient-text eyebrow">SUANKULARB ROBOTICS CLUB · 2026</div>
    <h1 class="skrc-gradient-text">Advanced Competitive<br>Robotics Science</h1>
    <div class="th">หลักสูตรหุ่นยนต์เพื่อการแข่งขันขั้นสูง</div>
    <div class="meta">โรงเรียนสวนกุหลาบวิทยาลัย</div>
    <div class="badge">SKRC</div>
  </div>
</body>
</html>
