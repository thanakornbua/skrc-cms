[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -DCORE_DEBUG_LEVEL=0

[env:esp32dev_http]
build_flags =
  ${env.build_flags}
  -DTRANSPORT_HTTP=1

[env:esp32dev_serial]
build_flags =
  ${env.build_flags}
  -DTRANSPORT_SERIAL=1
